<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0d1f0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-title" content="GameDrop">
  <title>GameDrop</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --g:  #35682d;
      --g2: #4a8f3f;
      --g3: #5db050;
      --bg1: #060e04;
      --bg2: #0d1a0a;
      --tx:  #e8f5e4;
      --tm:  rgba(200,230,195,0.55);
      --td:  rgba(150,200,140,0.3);
      --glass:   rgba(255,255,255,0.04);
      --glass2:  rgba(255,255,255,0.07);
      --glass3:  rgba(255,255,255,0.11);
      --gb1: rgba(53,104,45,0.15);
      --gb2: rgba(53,104,45,0.28);
      --gb3: rgba(53,104,45,0.45);
      --glow: 0 0 30px rgba(53,104,45,0.25);
      --border: rgba(255,255,255,0.08);
      --border2: rgba(53,104,45,0.35);
      --hf: 'Barlow Condensed', sans-serif;
      --bf: 'DM Sans', sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html,body{
      background:var(--bg1);color:var(--tx);font-family:var(--bf);
      min-height:100vh;overflow-x:hidden;
    }

    /* ── Background orbs ── */
    body::before,body::after{
      content:'';position:fixed;border-radius:50%;pointer-events:none;z-index:0;
    }
    body::before{
      width:420px;height:420px;top:-100px;right:-120px;
      background:radial-gradient(circle,rgba(53,104,45,0.22) 0%,transparent 70%);
    }
    body::after{
      width:500px;height:500px;bottom:-150px;left:-150px;
      background:radial-gradient(circle,rgba(53,104,45,0.15) 0%,transparent 70%);
    }
    #app{position:relative;z-index:1}

    /* ── Header ── */
    .hdr{
      background:rgba(10,20,8,0.6);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border-bottom:1px solid var(--border2);
      padding:env(safe-area-inset-top,0) 0 0;
      position:sticky;top:0;z-index:100;
    }
    .hdr-inner{padding:14px 16px 13px}
    .hdr-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .logo{font-family:var(--hf);font-size:26px;font-weight:700;letter-spacing:4px;
      background:linear-gradient(135deg,#a8d99e,#35682d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .cfg-btn{
      background:var(--glass2);border:1px solid var(--border);
      border-radius:8px;padding:7px 11px;color:var(--tm);font-size:15px;cursor:pointer;
      backdrop-filter:blur(10px);
    }
    .srch{
      background:var(--glass);border:1px solid var(--border2);
      border-radius:12px;display:flex;align-items:center;padding:0 13px;gap:9px;
      backdrop-filter:blur(10px);
    }
    .srch input{
      background:transparent;border:none;color:var(--tx);
      font-family:var(--bf);font-size:15px;padding:11px 0;flex:1;outline:none;
    }
    .srch input::placeholder{color:var(--td)}

    /* ── Filters ── */
    .filters{
      background:rgba(6,14,4,0.4);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
      padding:9px 16px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;
    }
    .filters::-webkit-scrollbar{display:none}
    .pill{
      background:var(--glass);border:1px solid var(--border);
      color:var(--tm);font-family:var(--hf);font-size:13px;letter-spacing:1.2px;
      padding:5px 16px;border-radius:20px;white-space:nowrap;cursor:pointer;transition:all .2s;
      backdrop-filter:blur(8px);
    }
    .pill.on{
      background:var(--gb2);border-color:var(--g2);color:#c8f0c0;font-weight:600;
      box-shadow:0 0 12px rgba(53,104,45,0.4);
    }

    /* ── Tabs ── */
    .tabs{
      display:flex;background:rgba(6,14,4,0.5);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border);
    }
    .tab{
      flex:1;padding:11px 0;text-align:center;font-family:var(--hf);
      font-size:10px;letter-spacing:1px;color:var(--td);cursor:pointer;
      border-bottom:2px solid transparent;transition:all .2s;
    }
    .tab.on{color:#a8d99e;border-bottom-color:var(--g2);text-shadow:0 0 8px rgba(53,104,45,0.6)}
    .wish-btn{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.55);border:none;color:rgba(255,255,255,0.35);font-size:18px;width:32px;height:32px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:color .2s,background .2s;}
    .wish-btn.wished{color:#35682d;background:rgba(0,0,0,0.7);}
    .card{position:relative;}

    /* ── Grid ── */
    .sec-hdr{padding:14px 16px 6px;font-family:var(--hf);font-size:11px;letter-spacing:2px;color:var(--td)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 12px 12px}

    /* ── Cards ── */
    .card{
      background:var(--glass);
      border:1px solid var(--border);
      border-radius:14px;overflow:hidden;cursor:pointer;
      backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);
      transition:transform .15s,border-color .2s,box-shadow .2s;
      user-select:none;position:relative;
    }
    .card::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,0.05) 0%,transparent 60%);
      border-radius:14px;pointer-events:none;z-index:1;
    }
    .card:active{transform:scale(.96);border-color:var(--g2);box-shadow:var(--glow)}
    .card-noimg{background:transparent!important;border-color:transparent!important;backdrop-filter:none!important;-webkit-backdrop-filter:none!important;}
    .card-noimg::before{display:none}
    .card-noimg:active{border-color:transparent!important;box-shadow:none}
    .c-img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;position:relative;z-index:0}
    .c-ph{width:100%;padding:18px 0 10px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:30px}
    .c-body{padding:9px 10px;position:relative;z-index:2}
    .c-title{
      font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--tx);
      margin-bottom:3px;line-height:1.25;
      display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;
    }
    .c-date{font-size:11px;color:#7cc470;font-weight:500;margin-bottom:5px}
    .badges{display:flex;flex-wrap:wrap;gap:3px}
    .badge{
      font-size:10px;font-family:var(--hf);letter-spacing:.5px;padding:2px 7px;
      border-radius:5px;background:var(--glass2);color:var(--tm);border:1px solid var(--border);
      backdrop-filter:blur(4px);
    }
    .badge.pc{border-color:rgba(53,104,45,.5);color:#7cc470}
    .badge.ps5{border-color:rgba(60,130,255,.4);color:#6aadff}
    .badge.xbox{border-color:rgba(80,200,80,.4);color:#72cc72}
    .badge.sw{border-color:rgba(255,60,70,.4);color:#ff7070}
    .c-score{
      display:inline-flex;align-items:center;justify-content:center;
      width:26px;height:26px;border-radius:6px;
      font-family:var(--hf);font-size:13px;font-weight:700;margin-top:5px;
      backdrop-filter:blur(8px);
    }
    .sg{background:rgba(53,104,45,.25);color:#7cc470;border:1px solid rgba(53,104,45,.6);box-shadow:0 0 8px rgba(53,104,45,.3)}
    .sy{background:rgba(255,193,7,.15);color:#ffd54f;border:1px solid rgba(255,193,7,.5)}
    .sr{background:rgba(255,80,50,.15);color:#ff7060;border:1px solid rgba(255,80,50,.5)}

    /* ── Bottom Sheet ── */
    .backdrop{
      position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:190;
      opacity:0;transition:opacity .25s;pointer-events:none;
      backdrop-filter:blur(4px);
    }
    .backdrop.vis{opacity:1;pointer-events:all}
    .sheet{
      position:fixed;bottom:0;left:0;right:0;max-height:89vh;
      background:rgba(8,18,6,0.75);
      backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
      border-radius:22px 22px 0 0;
      border-top:1px solid var(--border2);
      border-left:1px solid var(--border);
      border-right:1px solid var(--border);
      overflow-y:auto;z-index:200;
      transform:translateY(100%);transition:transform .32s cubic-bezier(.25,.8,.25,1);
      padding-bottom:env(safe-area-inset-bottom,20px);
    }
    .sheet.vis{transform:translateY(0)}
    .sheet-handle{width:44px;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;margin:13px auto 0}
    .sheet-img{width:100%;aspect-ratio:16/9;object-fit:cover}
    .sheet-img-wrap{position:relative}
    .sheet-img-wrap::after{
      content:'';position:absolute;bottom:0;left:0;right:0;height:80px;
      background:linear-gradient(to top,rgba(8,18,6,0.9),transparent);
    }
    .sheet-ph{width:100%;padding:40px 0 24px;background:transparent;display:flex;align-items:center;justify-content:center;font-size:60px}
    .sheet-body{padding:16px}
    .sheet-title{
      font-family:var(--hf);font-size:24px;font-weight:700;line-height:1.2;margin-bottom:4px;
      background:linear-gradient(135deg,#e8f5e4,#a0d090);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .sheet-date{font-size:13px;color:#7cc470;font-weight:500;margin-bottom:10px}
    .sheet-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
    .sheet-desc{font-size:14px;color:var(--tm);line-height:1.7;margin-bottom:16px}
    .meta-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px}
    .meta-box{
      background:var(--glass);border:1px solid var(--border);
      border-radius:10px;padding:11px 12px;
      backdrop-filter:blur(12px);
    }
    .meta-lbl{font-family:var(--hf);font-size:10px;letter-spacing:1.8px;color:var(--td);margin-bottom:5px}
    .meta-val{font-size:13px;font-weight:500;color:var(--tx)}
    .big-score{font-family:var(--hf);font-size:30px;font-weight:700;display:inline-block}
    .genres{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
    .genre{
      font-size:11px;padding:3px 10px;border-radius:12px;
      background:var(--gb1);color:#7cc470;border:1px solid var(--gb2);
      backdrop-filter:blur(6px);
    }
    .sheet-close{
      position:absolute;top:15px;right:16px;
      background:rgba(255,255,255,0.07);border:1px solid var(--border);
      border-radius:50%;width:32px;height:32px;
      display:flex;align-items:center;justify-content:center;
      color:var(--tm);font-size:18px;cursor:pointer;z-index:10;
      backdrop-filter:blur(8px);
    }
    .sh-sec-lbl{font-family:var(--hf);font-size:10px;letter-spacing:2.5px;color:var(--td);margin-bottom:10px}

    /* ── Trailer ── */
    .trailer-box{
      width:100%;border-radius:12px;overflow:hidden;
      background:var(--glass2);border:1px solid var(--border);margin-bottom:4px;
    }
    .trailer-vid{width:100%;display:block;max-height:220px;background:#000}
    .yt-btn{
      display:flex;align-items:center;gap:13px;
      background:rgba(255,40,40,0.08);border:1px solid rgba(255,40,40,0.25);
      border-radius:12px;padding:14px 16px;color:#ff7070;
      text-decoration:none;font-size:14px;font-weight:500;margin-bottom:4px;
      backdrop-filter:blur(8px);
    }

    /* ── Articles ── */
    .art-row{display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
    .art-btn{
      display:flex;align-items:center;gap:13px;
      background:var(--glass);border:1px solid var(--border);
      border-radius:12px;padding:13px 15px;text-decoration:none;color:var(--tx);
      backdrop-filter:blur(10px);transition:border-color .2s;
    }
    .art-btn:active{border-color:var(--g2)}
    .art-ico{font-size:22px;line-height:1;flex-shrink:0}
    .art-ttl{font-size:14px;font-weight:500;margin-bottom:2px;color:var(--tx)}
    .art-sub{font-size:11px;color:var(--td)}

    /* ── States ── */
    .loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 20px;gap:16px}
    .spin{
      width:38px;height:38px;
      border:2px solid rgba(53,104,45,0.2);border-top-color:var(--g2);
      border-radius:50%;animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .load-txt{font-family:var(--hf);letter-spacing:3px;font-size:12px;color:var(--td)}
    .empty{padding:70px 20px;text-align:center}
    .empty-ico{font-size:52px;margin-bottom:16px;filter:drop-shadow(0 0 12px rgba(53,104,45,.4))}
    .empty-ttl{font-family:var(--hf);font-size:18px;letter-spacing:1px;color:var(--tm);margin-bottom:8px}
    .empty-sub{font-size:13px;color:var(--td)}

    /* ── Setup ── */
    .setup{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center}
    .setup-logo{
      font-family:var(--hf);font-size:56px;font-weight:700;letter-spacing:5px;line-height:1;
      background:linear-gradient(135deg,#c8f0c0,#35682d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .setup-sub-txt{font-size:11px;color:var(--td);margin-bottom:40px;letter-spacing:2.5px;margin-top:7px}
    .setup-card{
      background:var(--glass);border:1px solid var(--border2);border-radius:16px;
      padding:24px;width:100%;max-width:360px;text-align:left;
      backdrop-filter:blur(20px);
      box-shadow:0 8px 32px rgba(0,0,0,0.4),var(--glow);
    }
    .setup-lbl{font-family:var(--hf);font-size:11px;letter-spacing:2px;color:var(--td);margin-bottom:7px}
    .setup-in{
      width:100%;background:var(--glass2);border:1px solid var(--border);
      border-radius:9px;color:var(--tx);font-family:var(--bf);font-size:14px;
      padding:12px 14px;outline:none;transition:border-color .15s;margin-bottom:14px;
    }
    .setup-in:focus{border-color:var(--g2);box-shadow:0 0 0 3px rgba(53,104,45,.15)}
    .setup-btn{
      width:100%;background:linear-gradient(135deg,var(--g),var(--g2));
      border:none;border-radius:9px;color:#d8f5d0;
      font-family:var(--hf);font-size:15px;letter-spacing:2.5px;padding:13px;
      cursor:pointer;font-weight:700;
      box-shadow:0 4px 20px rgba(53,104,45,.4);
      transition:opacity .15s;
    }
    .setup-btn:active{opacity:.85}
    .setup-help{font-size:12px;color:var(--td);margin-top:14px;line-height:1.7}
    .setup-help a{color:#7cc470;text-decoration:none}
    .setup-ico{
      width:64px;height:64px;
      background:linear-gradient(135deg,var(--g),var(--g2));
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:30px;margin:0 auto 20px;
      box-shadow:0 0 24px rgba(53,104,45,.5);
    }

    /* ── Install banner ── */
    .install-bar{
      background:var(--glass);backdrop-filter:blur(12px);
      border-bottom:1px solid var(--border2);
      padding:11px 16px;display:flex;align-items:center;gap:10px;
    }
    .install-txt{font-size:13px;color:var(--tm);flex:1}
    .install-btn{
      background:linear-gradient(135deg,var(--g),var(--g2));
      border:none;border-radius:7px;color:#d8f5d0;
      font-family:var(--hf);font-size:12px;letter-spacing:1.5px;
      padding:7px 13px;cursor:pointer;font-weight:700;white-space:nowrap;
    }
    .x-btn{background:transparent;border:none;color:var(--td);font-size:20px;cursor:pointer;padding:0 2px;line-height:1}
    .pad{height:28px}

  let url='https://api.rawg.io/api/games?key='+S.key+'&dates='+dates+'&ordering='+order+'&page_size=40&platforms='+plats;
  if(S.query)url+='&search='+encodeURIComponent(S.query);
  try{const r=await fetch(url);if(!r.ok)throw new Error(r.status);const d=await r.json();S.games=d.results||[];S.nextPage=d.next||null;}
  catch(e){S.games=[];S.nextPage=null;}
  S.loading=false;render();
}

async function loadMore(){
  if(!S.nextPage||S.loadingMore)return;
  S.loadingMore=true;render();
  try{const r=await fetch(S.nextPage);if(!r.ok)throw new Error(r.status);const d=await r.json();S.games=[...S.games,...(d.results||[])];S.nextPage=d.next||null;}
  catch(e){}
  S.loadingMore=false;render();
}


async function loadDetail(id){
  S.detailLoading=true;S.trailer=null;renderSheet();
  try{
    const[rd,rm]=await Promise.all([
      fetch('https://api.rawg.io/api/games/'+id+'?key='+S.key),
      fetch('https://api.rawg.io/api/games/'+id+'/movies?key='+S.key)
    ]);
    const d=await rd.json();const m=await rm.json();
    S.detail=d;S.trailer=(m.results&&m.results.length)?m.results[0]:null;
    S.detailLoading=false;renderSheet();
  }catch(e){S.detailLoading=false;renderSheet();}
}

function fmtDate(s){if(!s)return'—';return new Date(s).toLocaleDateString('de-DE',{day:'2-digit',month:'short',year:'numeric'});}
function scoreCls(n){return n>=80?'sg':n>=60?'sy':'sr';}
function platformBadges(platforms){
  if(!platforms)return'';
  return platforms.filter(p=>PLAT_LABEL[p.platform.id])
    .map(p=>'<span class="badge '+(PLAT_CLS[p.platform.id]||'')+'">'+PLAT_LABEL[p.platform.id]+'</span>').join('');
}
function stripHtml(s){const d=document.createElement('div');d.innerHTML=s;return d.textContent||'';}

function toggleWish(g,e){
  e.stopPropagation();
  const idx=S.wishlist.findIndex(x=>x.id===g.id);
  if(idx>=0)S.wishlist.splice(idx,1);
  else S.wishlist.push({id:g.id,name:g.name,background_image:g.background_image,released:g.released,platforms:g.platforms,metacritic:g.metacritic});
  localStorage.setItem('wishlist',JSON.stringify(S.wishlist));
  render();
  if(S.detail)renderSheet();
}
function isWished(id){return S.wishlist.some(x=>x.id===id);}

function render(){
  const app=document.getElementById('app');
  if(!S.key){app.innerHTML=tplSetup();bindSetup();return;}
  app.innerHTML=
    tplHeader()+
    (S.installPrompt&&!S.bannerDone?tplBanner():'')+
    tplFilters()+tplTabs()+
    (S.tab==='wishlist'
      ? (S.wishlist.length?tplWishGrid():tplWishEmpty())
      : (S.loading?tplLoading():S.games.length?tplGrid():tplEmpty()))+
    '<div class="pad"></div>'+
    '<div class="backdrop" id="bd" onclick="closeSheet()"></div>'+
    '<div class="sheet" id="sh"><div class="sheet-handle"></div>'+
    '<button class="sheet-close" onclick="closeSheet()">&#215;</button>'+
    '<div id="sh-content"></div></div>';
  bindMain();
  if(S.detail){openSheetEl();renderSheet();}
}

function tplSetup(){
  return '<div class="setup">'+
    '<div class="setup-ico">' + CTRL_IMG + '</div>'+
    '<div class="setup-logo">GAME<br>DROP</div>'+
    '<div class="setup-sub-txt">PC &middot; XBOX &middot; PS5 &middot; RELEASES</div>'+
    '<div class="setup-card">'+
      '<div class="setup-lbl">RAWG API-KEY</div>'+
      '<input class="setup-in" id="ki" type="text" placeholder="Hier deinen Key einf&uuml;gen&hellip;" autocomplete="off" spellcheck="false">'+
      '<button class="setup-btn" id="kb">LOSLEGEN &rarr;</button>'+
      '<div class="setup-help">Kostenlosen Key auf <a href="https://rawg.io/apidocs" target="_blank">rawg.io/apidocs</a> holen.<br>Kostenlos &middot; kein Spam &middot; nur lokal gespeichert.</div>'+
    '</div></div>';
}

function tplHeader(){
  return '<div class="hdr"><div class="hdr-inner">'+
    '<div class="hdr-row"><div class="logo">GAME<span style="-webkit-text-fill-color:rgba(168,217,158,.4);font-style:normal">DROP</span></div><button class="cfg-btn" id="cfg-btn">&#9881;</button></div>'+
    '<div class="srch">'+
    '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(150,200,140,0.4)" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>'+
    '<input id="srch-in" type="search" placeholder="Spiel suchen&hellip;" value="'+S.query+'"></div>'+
    '</div></div>';
}

function tplBanner(){
  return '<div class="install-bar"><div class="install-txt">App installieren f&uuml;r den Homescreen</div>'+
    '<button class="install-btn" id="inst-btn">INSTALLIEREN</button><button class="x-btn" id="close-banner">&times;</button></div>';
}

function tplFilters(){
  const ps=[{k:'all',l:'ALLE'},{k:'pc',l:'PC'},{k:'ps5',l:'PS5'},{k:'xbox',l:'XBOX'}];
  return '<div class="filters">'+ps.map(p=>'<button class="pill '+(S.platform===p.k?'on':'')+'" data-p="'+p.k+'">'+p.l+'</button>').join('')+'</div>';
}

function tplTabs(){
  const ts=[{k:'new',l:'NEUE'},{k:'upcoming',l:'BALD'},{k:'popular',l:'TOP'},{k:'wishlist',l:'♥ LISTE'}];
  return '<div class="tabs">'+ts.map(t=>'<div class="tab '+(S.tab===t.k?'on':'')+'" data-t="'+t.k+'">'+t.l+'</div>').join('')+'</div>';
}

function tplWishGrid(){
  const cards=S.wishlist.map(g=>{
    const hasImg=!!g.background_image;
    const img=hasImg?'<img class="c-img" src="'+g.background_image+'" alt="" loading="lazy">':'<div class="c-ph">'+CTRL_IMG+'</div>';
    const score=g.metacritic?'<div class="c-score '+scoreCls(g.metacritic)+'">'+g.metacritic+'</div>':'';
    return '<div class="card'+(hasImg?'':' card-noimg')+'" data-id="'+g.id+'">'+img+
      '<button class="wish-btn wished" data-id="'+g.id+'">♥</button>'+
      '<div class="c-body"><div class="c-title">'+g.name+'</div><div class="c-date">'+fmtDate(g.released)+'</div><div class="badges">'+platformBadges(g.platforms)+'</div>'+score+'</div></div>';
  }).join('');
  return '<div class="sec-hdr">'+S.wishlist.length+' SPIELE AUF DER LISTE</div><div class="grid">'+cards+'</div>';
}
function tplWishEmpty(){return '<div class="empty"><div class="empty-ico">'+CTRL_IMG+'</div><div class="empty-ttl">KEINE SPIELE</div><div class="empty-sub">Tippe das ♥ auf einer Spielkarte</div></div>';}

function tplLoading(){return '<div class="loading"><div class="spin"></div><div class="load-txt">LADE RELEASES&hellip;</div></div>';}

function tplEmpty(){return '<div class="empty"><div class="empty-ico">' + CTRL_IMG + '</div><div class="empty-ttl">KEINE ERGEBNISSE</div><div class="empty-sub">Filter oder Suche anpassen</div></div>';}

function tplGrid(){
  const cards=S.games.map(g=>{
    const hasImg=!!g.background_image;
    const img=hasImg
      ?'<img class="c-img" src="'+g.background_image+'" alt="" loading="lazy">'
      :'<div class="c-ph">' + CTRL_IMG + '</div>';
    const score=g.metacritic?'<div class="c-score '+scoreCls(g.metacritic)+'">'+g.metacritic+'</div>':'';
    const wished=isWished(g.id);
    return '<div class="card'+(hasImg?'':' card-noimg')+'" data-id="'+g.id+'">'+img+
      '<button class="wish-btn'+(wished?' wished':'')+'" data-id="'+g.id+'">♥</button>'+
      '<div class="c-body">'+
        '<div class="c-title">'+g.name+'</div>'+
        '<div class="c-date">'+fmtDate(g.released)+'</div>'+
        '<div class="badges">'+platformBadges(g.platforms)+'</div>'+
        score+
      '</div></div>';
  }).join('');
  const mehr=S.nextPage?'<div style="text-align:center;padding:16px 0">'+(S.loadingMore?'<div class="load-txt">LADE MEHR…</div>':'<button class="pill" id="mehr-btn" style="padding:10px 28px;font-size:11px">MEHR LADEN</button>')+'</div>':'';
  return '<div class="sec-hdr">'+S.games.length+' SPIELE GEFUNDEN</div><div class="grid">'+cards+'</div>'+mehr;
}

function renderSheet(){
  const el=document.getElementById('sh-content');
  if(!el)return;
  const g=S.detail;if(!g)return;
  const rawDesc=g.description_raw||(g.description?stripHtml(g.description):'');
  const desc=rawDesc?rawDesc.substring(0,400)+(rawDesc.length>400?'&hellip;':''):'';
  const ytUrl='https://www.youtube.com/results?search_query='+encodeURIComponent(g.name+' trailer deutsch');
  const news1='https://news.google.com/search?q='+encodeURIComponent(g.name+' Test Review')+'&hl=de&gl=DE&ceid=DE:de';
  const news2='https://news.google.com/search?q='+encodeURIComponent(g.name)+'&hl=de&gl=DE&ceid=DE:de';

  let trailerHtml;
  if(S.detailLoading){
    trailerHtml='<div class="trailer-box" style="padding:28px;text-align:center"><div class="load-txt">LADE TRAILER&hellip;</div></div>';
  }else if(S.trailer&&S.trailer.data){
    const src=S.trailer.data.max||S.trailer.data['480']||'';
    const poster=S.trailer.preview||'';
    trailerHtml='<div class="trailer-box"><video class="trailer-vid" src="'+src+'" poster="'+poster+'" controls playsinline preload="none"></video></div>';
  }else{
    trailerHtml='<a class="yt-btn" href="'+ytUrl+'" target="_blank"><span style="font-size:20px">&#9654;</span> Trailer auf YouTube suchen</a>';
  }

  const heroImg=g.background_image
    ?'<div class="sheet-img-wrap"><img class="sheet-img" src="'+g.background_image+'" alt=""></div>'
    :'<div class="sheet-ph">' + CTRL_IMG + '</div>';
  const metaScore=g.metacritic?'<div class="meta-box"><div class="meta-lbl">METACRITIC</div><div class="big-score '+scoreCls(g.metacritic)+'">'+g.metacritic+'</div></div>':'';
  const relDate=g.released?'<div class="meta-box"><div class="meta-lbl">RELEASE</div><div class="meta-val">'+fmtDate(g.released)+'</div></div>':'';
  const dev=(g.developers&&g.developers.length)?'<div class="meta-box"><div class="meta-lbl">DEVELOPER</div><div class="meta-val" style="font-size:12px">'+g.developers[0].name+'</div></div>':'';
  const pub=(g.publishers&&g.publishers.length)?'<div class="meta-box"><div class="meta-lbl">PUBLISHER</div><div class="meta-val" style="font-size:12px">'+g.publishers[0].name+'</div></div>':'';
  const playtime=g.playtime?'<div class="meta-box"><div class="meta-lbl">SPIELZEIT</div><div class="meta-val">~'+g.playtime+'h</div></div>':'';
  const ratings=g.ratings_count?'<div class="meta-box"><div class="meta-lbl">BEWERTUNGEN</div><div class="meta-val">'+g.ratings_count.toLocaleString()+'</div></div>':'';
  const genres=(g.genres&&g.genres.length)?'<div class="genres">'+g.genres.map(gn=>'<span class="genre">'+gn.name+'</span>').join('')+'</div>':'';

  el.innerHTML=
    heroImg+
    '<div class="sheet-body">'+
      '<div class="sheet-title">'+g.name+'</div>'+
      '<div class="sheet-date">'+fmtDate(g.released)+'</div>'+
      '<div class="sheet-badges">'+platformBadges(g.platforms)+'</div>'+
      '<div class="meta-grid">'+metaScore+relDate+dev+pub+playtime+ratings+'</div>'+
      (desc?'<div class="sheet-desc">'+desc+'</div>':'')+
      '<div class="sh-sec-lbl">TRAILER</div>'+trailerHtml+
      '<div class="sh-sec-lbl" style="margin-top:18px">ARTIKEL AUF DEUTSCH</div>'+
      '<div class="art-row">'+
        '<a class="art-btn" href="'+news1+'" target="_blank"><span class="art-ico">&#128240;</span><div><div class="art-ttl">Test &amp; Review</div><div class="art-sub">Google News &middot; Deutsch</div></div></a>'+
        '<a class="art-btn" href="'+news2+'" target="_blank"><span class="art-ico">&#128269;</span><div><div class="art-ttl">Alle News</div><div class="art-sub">Google News &middot; Deutsch</div></div></a>'+
      '</div>'+
      genres+
      '<div style="height:10px"></div>'+
    '</div>';
}

function openSheetEl(){
  document.getElementById('bd').classList.add('vis');
  document.getElementById('sh').classList.add('vis');
}
function closeSheet(){
  S.detail=null;S.trailer=null;
  document.getElementById('bd').classList.remove('vis');
  document.getElementById('sh').classList.remove('vis');
}

function bindSetup(){
  const ki=document.getElementById('ki');
  const kb=document.getElementById('kb');
  if(!ki||!kb)return;
  kb.addEventListener('click',()=>{const v=ki.value.trim();if(v){S.key=v;localStorage.setItem('rawg_key',v);loadGames();}});
  ki.addEventListener('keydown',e=>{if(e.key==='Enter')kb.click();});
}

function bindMain(){
  const si=document.getElementById('srch-in');
  if(si){let dt;si.addEventListener('input',e=>{S.query=e.target.value;clearTimeout(dt);dt=setTimeout(loadGames,480);});}
  document.getElementById('cfg-btn')?.addEventListener('click',()=>{
    if(confirm('API-Key zur\u00fccksetzen?')){localStorage.removeItem('rawg_key');S.key='';S.games=[];render();}
  });
  document.querySelectorAll('.pill').forEach(b=>{b.addEventListener('click',()=>{S.platform=b.dataset.p;loadGames();});});
  document.querySelectorAll('.tab').forEach(t=>{t.addEventListener('click',()=>{S.tab=t.dataset.t;loadGames();});});
  document.querySelectorAll('.wish-btn').forEach(b=>{b.addEventListener('click',e=>{
    e.stopPropagation();
    const id=parseInt(b.dataset.id);
    const g=S.games.find(x=>x.id===id)||S.wishlist.find(x=>x.id===id);
    if(g)toggleWish(g,e);
  });});
  document.querySelectorAll('.card').forEach(c=>{
    c.addEventListener('click',()=>{
      const id=parseInt(c.dataset.id);
      const g=S.games.find(x=>x.id===id)||S.wishlist.find(x=>x.id===id);if(!g)return;
      S.detail=g;S.trailer=null;
      openSheetEl();renderSheet();loadDetail(id);
    });
  });
  document.getElementById('mehr-btn')?.addEventListener('click',loadMore);
  document.getElementById('inst-btn')?.addEventListener('click',()=>{
    S.installPrompt?.prompt();
    S.installPrompt?.userChoice.then(()=>{S.installPrompt=null;render();});
  });
  document.getElementById('close-banner')?.addEventListener('click',()=>{S.bannerDone=true;localStorage.setItem('bnd','1');render();});
}

render();
if(S.key)loadGames();
</script>
</body>
</html>
